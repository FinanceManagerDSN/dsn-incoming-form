<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Мої платежі</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f1f3f5);
    --text: var(--tg-theme-text-color, #1c1c1e);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --accent: var(--tg-theme-button-color, #2481cc);
    --field-bg: var(--tg-theme-section-bg-color, #ffffff);
    --ok-bg: #e8f5e9; --ok-fg: #1b5e20;
    --wait-bg: #fff3e0; --wait-fg: #e65100;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--secondary-bg); color: var(--text);
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 10px 10px 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .tabs button { flex: 1; background: var(--field-bg); color: var(--text);
    border: 1.5px solid transparent; border-radius: 12px; padding: 11px;
    font: inherit; font-weight: 600; cursor: pointer; }
  .tabs button.active { border-color: var(--accent); color: var(--accent); }
  .filters { background: var(--field-bg); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
  .filters .row { display: flex; gap: 8px; margin-top: 8px; }
  .filters .row:first-child { margin-top: 0; }
  .filters .row > * { flex: 1; }
  select, input[type="text"], input[type="date"] {
    width: 100%; background: var(--secondary-bg); color: var(--text);
    border: 1px solid transparent; border-radius: 10px; padding: 9px 10px;
    font: inherit; font-size: 14px; outline: none; appearance: none; -webkit-appearance: none; }
  select:focus, input:focus { border-color: var(--accent); }
  .seg { display: flex; gap: 6px; }
  .seg button { flex: 1; background: var(--secondary-bg); color: var(--text);
    border: 1.5px solid transparent; border-radius: 10px; padding: 8px 4px;
    font: inherit; font-size: 13.5px; cursor: pointer; }
  .seg button.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .summary { font-size: 12.5px; color: var(--hint); margin: 4px 2px 8px; }
  .pay { background: var(--field-bg); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
  .pay-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .pay-id { font-weight: 700; }
  .badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
  .badge.ok { background: var(--ok-bg); color: var(--ok-fg); }
  .badge.wait { background: var(--wait-bg); color: var(--wait-fg); }
  .badge.ret { background: #eceff1; color: #546e7a; }
  .pay-sum { font-size: 18px; font-weight: 700; margin: 4px 0 2px; }
  .pay-meta { font-size: 13px; color: var(--hint); }
  .po-line { display: flex; justify-content: space-between; font-size: 13.5px;
    padding: 5px 0; border-top: 1px dashed var(--secondary-bg); }
  .po-line:first-of-type { margin-top: 8px; }
  .po-line .pct { color: var(--hint); }
  .pay-comment { font-size: 13px; color: var(--hint); margin-top: 8px; font-style: italic; }
  .kv { display: flex; justify-content: space-between; font-size: 13.5px; padding: 4px 0; }
  .kv span:first-child { color: var(--hint); }
  .kv.hl span:last-child { font-weight: 700; }
  .kv .wait-c { color: var(--wait-fg); font-weight: 600; }
  .refresh-btn { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); border-radius: 10px;
    font: inherit; font-size: 13.5px; cursor: pointer; }
  .empty { text-align: center; color: var(--hint); padding: 40px 10px; }
  .spin { display: inline-block; animation: r 1s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="tabs">
  <button id="tabPay" class="active">💸 Платежі</button>
  <button id="tabPo">📦 По PO</button>
</div>

<!-- ─── вкладка Платежі ─── -->
<div id="payView">
  <div class="filters">
    <div class="row">
      <div class="seg" id="statusSeg">
        <button data-v="" class="active">Всі</button>
        <button data-v="Не надійшло">⏳ Очікуються</button>
        <button data-v="Надійшло">✅ Надійшли</button>
        <button data-v="Не надійшов/Повернувся">↩️ Повернулись</button>
      </div>
    </div>
    <div class="row" id="managerRow" style="display:none">
      <select id="managerSel"><option value="">Менеджер: всі</option></select>
    </div>
    <div class="row"><input type="text" id="search" placeholder="Пошук: клієнт або PO №"></div>
    <div class="row"><input type="date" id="dateFrom"><input type="date" id="dateTo"></div>
  </div>
  <div class="summary" id="summary"></div>
  <div id="list"><div class="empty"><span class="spin">⏳</span> Завантажую…</div></div>
</div>

<!-- ─── вкладка По PO ─── -->
<div id="poView" style="display:none">
  <div class="filters">
    <div class="row"><input type="text" id="poSearch" placeholder="Пошук: PO № або клієнт"></div>
    <div class="row"><input type="date" id="poFrom"><input type="date" id="poTo"></div>
  </div>
  <div class="summary" id="poSummaryLine"></div>
  <div id="poListView"><div class="empty">Обери період або просто почекай — вантажу все ⏳</div></div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/XXXX/exec"; // ← URL Apps Script (той самий)
  const SECRET_READ = "інший-рядок-для-читання";                  // ← = SECRET_READ у .gs (для «Оновити з МС»)

  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  // user_id з URL (?uid=...) — надійний шлях, що не залежить від initData
  const URL_UID = new URLSearchParams(location.search).get('uid') || '';

  function api(body) {
    body.init_data = tg.initData || '';
    body.uid = URL_UID;            // запасний user_id з посилання
    return fetch(GAS_URL, { method: "POST", body: JSON.stringify(body) }).then(r => r.json());
  }
  function fmt(v) { return Number(v).toLocaleString("uk-UA", {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
  function esc(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }

  // ─────────── вкладки ───────────
  const tabPay = document.getElementById("tabPay"), tabPo = document.getElementById("tabPo");
  tabPay.addEventListener("click", () => switchTab("pay"));
  tabPo.addEventListener("click", () => switchTab("po"));
  let poLoaded = false;
  function switchTab(t) {
    tabPay.classList.toggle("active", t === "pay");
    tabPo.classList.toggle("active", t === "po");
    document.getElementById("payView").style.display = t === "pay" ? "block" : "none";
    document.getElementById("poView").style.display = t === "po" ? "block" : "none";
    if (t === "po" && !poLoaded) { poLoaded = true; loadPoSummary(); }
  }

  // ─────────── ПЛАТЕЖІ ───────────
  let ALL = [], IS_ADMIN = false;
  let f = { status: "", manager: "", q: "", from: "", to: "" };

  api({ action: "list" })
    .then(j => {
      if (j.error) throw new Error(j.error);
      ALL = j.payments || [];
      IS_ADMIN = !!j.is_admin;
      if (IS_ADMIN) {
        document.getElementById("managerRow").style.display = "flex";
        const mgrs = [...new Set(ALL.map(p => p.manager).filter(Boolean))].sort();
        const sel = document.getElementById("managerSel");
        mgrs.forEach(m => sel.add(new Option("Менеджер: " + m, m)));
      }
      render();
    })
    .catch(() => {
      document.getElementById("list").innerHTML =
        '<div class="empty">⚠️ Не вдалося завантажити (відкрий кабінет через кнопку бота).</div>';
    });

  document.querySelectorAll("#statusSeg button").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll("#statusSeg button").forEach(x => x.classList.remove("active"));
    b.classList.add("active"); f.status = b.dataset.v; render();
  }));
  document.getElementById("managerSel").addEventListener("change", e => { f.manager = e.target.value; render(); });
  document.getElementById("search").addEventListener("input", e => { f.q = e.target.value.trim().toLowerCase(); render(); });
  document.getElementById("dateFrom").addEventListener("change", e => { f.from = e.target.value; render(); });
  document.getElementById("dateTo").addEventListener("change", e => { f.to = e.target.value; render(); });

  function parseDate(s) {
    const m = String(s).match(/^(\d{2})\.(\d{2})\.(\d{4})/);
    return m ? new Date(+m[3], +m[2] - 1, +m[1]) : null;
  }
  function passes(p) {
    if (f.status && p.status !== f.status) return false;
    if (f.manager && p.manager !== f.manager) return false;
    if (f.q) {
      const inClient = String(p.client).toLowerCase().includes(f.q);
      const inPo = (p.items || []).some(it => String(it.po).includes(f.q));
      if (!inClient && !inPo) return false;
    }
    const d = parseDate(p.date);
    if (f.from && d && d < new Date(f.from)) return false;
    if (f.to && d && d > new Date(f.to + "T23:59:59")) return false;
    return true;
  }

  function render() {
    const rows = ALL.filter(passes);
    const sumByCur = {};
    rows.forEach(p => sumByCur[p.currency] = (sumByCur[p.currency] || 0) + Number(p.total || 0));
    document.getElementById("summary").textContent =
      rows.length + " платежів" +
      (rows.length ? " · разом: " + Object.entries(sumByCur).map(([c, s]) => fmt(s) + " " + c).join(" + ") : "") +
      (IS_ADMIN ? "" : " · показано тільки твої");

    const list = document.getElementById("list");
    if (!rows.length) { list.innerHTML = '<div class="empty">Нічого не знайдено 🤷</div>'; return; }

    list.innerHTML = rows.map(p => {
      const ok = p.status === "Надійшло";
      const returned = p.status === "Не надійшов/Повернувся";
      const bCls = ok ? "ok" : (returned ? "ret" : "wait");
      const bTxt = ok ? "✅ Надійшло" : (returned ? "↩️ Повернувся" : "⏳ Очікується");
      const items = (p.items || []).map(it =>
        '<div class="po-line"><span>PO ' + esc(it.po) +
        (it.location ? ' <span class="pct">📍 ' + esc(it.location) + '</span>' : '') + '</span>' +
        '<span>' + fmt(it.amount) + ' ' + esc(p.currency) +
        (it.percent_after != null ? ' <span class="pct">(→ ' + it.percent_after.toFixed(1) + '%)</span>' : '') +
        '</span></div>'
      ).join("");
      return '<div class="pay"' + (returned ? ' style="opacity:.6"' : '') + '>' +
        '<div class="pay-top"><span class="pay-id">№' + esc(p.id) + ' · ' + esc(p.client) + '</span>' +
        '<span class="badge ' + bCls + '">' + bTxt + '</span></div>' +
        '<div class="pay-sum">' + fmt(p.total) + ' ' + esc(p.currency) + '</div>' +
        '<div class="pay-meta">' + esc(p.date) + ' · ' + esc(p.account) + (IS_ADMIN ? ' · ' + esc(p.manager) : '') + '</div>' +
        items +
        (Number(p.balance) > 0 ? '<div class="po-line"><span>↪️ На баланс</span><span>' + fmt(p.balance) + ' ' + esc(p.currency) + '</span></div>' : '') +
        (p.comment ? '<div class="pay-comment">' + esc(p.comment) + '</div>' : '') +
        '</div>';
    }).join("");
  }

  // ─────────── ПО PO ───────────
  let POS = [];
  let pf = { q: "", from: "", to: "" };
  document.getElementById("poSearch").addEventListener("input", e => { pf.q = e.target.value.trim().toLowerCase(); renderPo(); });
  document.getElementById("poFrom").addEventListener("change", e => { pf.from = e.target.value; loadPoSummary(); });
  document.getElementById("poTo").addEventListener("change", e => { pf.to = e.target.value; loadPoSummary(); });

  function loadPoSummary() {
    document.getElementById("poListView").innerHTML =
      '<div class="empty"><span class="spin">⏳</span> Рахую зведення…</div>';
    api({ action: "po_list", from: pf.from || null, to: pf.to || null })
      .then(j => {
        if (j.error) throw new Error(j.error);
        POS = j.pos || [];
        renderPo();
      })
      .catch(() => {
        document.getElementById("poListView").innerHTML = '<div class="empty">⚠️ Не вдалося завантажити.</div>';
      });
  }

  function renderPo() {
    const rows = POS.filter(p => !pf.q ||
      String(p.po).includes(pf.q) || String(p.client).toLowerCase().includes(pf.q));
    document.getElementById("poSummaryLine").textContent = rows.length + " PO у вибірці";
    const box = document.getElementById("poListView");
    if (!rows.length) { box.innerHTML = '<div class="empty">Нічого не знайдено 🤷</div>'; return; }

    box.innerHTML = rows.map((p, i) => poCard(p, i, !p._fresh)).join("");
    // авто-перерахунок живцем з МС для кожного PO, який ще не оновлювали цієї сесії
    rows.forEach((p, i) => { if (!p._fresh) autoRefresh(p, i); });
  }

  function poCard(p, i, loading) {
    const cur = p.doc_currency || "";
    const badge = p.location ? '<span class="badge wait">📍 ' + esc(p.location) + '</span>' : '';
    const status = loading ? '<div class="pay-meta"><span class="spin">⏳</span> звіряю з МойСклад…</div>'
                           : (p._fresh ? '<div class="pay-meta" style="color:var(--ok-fg)">✓ актуально з МС</div>' : '');
    return '<div class="pay" id="poc' + i + '">' +
      '<div class="pay-top"><span class="pay-id">PO ' + esc(p.po) + ' · ' + esc(p.client) + '</span>' + badge + '</div>' +
      '<div class="pay-meta">' + esc(p.doc || "—") + '</div>' +
      kv("Сума документа", p.doc_sum, cur) +
      kv("Оплачено", p.paid, cur) +
      '<div class="kv"><span>⏳ Заявлено, не надійшло</span><span class="wait-c">' +
        (p.waiting != null ? fmt(p.waiting) + " " + cur : "—") + '</span></div>' +
      kvHl("Залишок", p.remaining, cur) +
      status +
      '</div>';
  }
  function kv(label, v, cur) {
    return '<div class="kv"><span>' + label + '</span><span>' + (v != null ? fmt(v) + " " + cur : "—") + '</span></div>';
  }
  function kvHl(label, v, cur) {
    return '<div class="kv hl"><span>' + label + '</span><span>' + (v != null ? fmt(v) + " " + cur : "—") + '</span></div>';
  }

  // тихий перерахунок живцем з МС (без кнопки) — актуальні цифри одразу
  function autoRefresh(p, i) {
    fetch(GAS_URL + "?secret=" + encodeURIComponent(SECRET_READ) + "&action=po&po=" + p.po)
      .then(r => r.json())
      .then(m => {
        if (!m.found) { p._fresh = true; replaceCard(p, i); return; }
        Object.assign(p, {
          doc: m.doc_name, location: m.location, doc_currency: m.doc_currency,
          doc_sum: m.order_sum, paid: m.paid_sum, waiting: m.pending_sum,
          remaining: Math.round((m.order_sum - m.paid_sum - m.pending_sum) * 100) / 100,
          _fresh: true
        });
        replaceCard(p, i);
      })
      .catch(() => { p._fresh = true; replaceCard(p, i); });
  }
  function replaceCard(p, i) {
    const el = document.getElementById("poc" + i);
    if (el) el.outerHTML = poCard(p, i, false);
  }
</script>
</body>
</html>
